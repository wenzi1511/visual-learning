<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playground Test Runner</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        /* === USING YOUR EXACT THEME === */
        :root {
            --bg-body: #0f172a;
            --bg-panel: #1e293b;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --border: #334155;
            /* Node Colors */
            --node-bg: #1e293b;
            --node-border: #64748b;
            /* Simple Structs - YOUR COLORS */
            --array-bg: #064e3b;
            --array-border: #34d399;
            --stack-bg: #0c4a6e;
            --stack-border: #38bdf8;
            --queue-bg: #831843;
            --queue-border: #f472b6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            padding: 30px;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Main two-column layout */
        .main-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            align-items: start;
        }

        @media (max-width: 1000px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        /* Problem description panel */
        .problem-panel {
            background: var(--bg-panel);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border);
            position: sticky;
            top: 30px;
        }

        .problem-panel h2 {
            font-size: 1.3rem;
            margin-bottom: 16px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .problem-panel h2 .icon {
            font-size: 1.5rem;
        }

        .problem-description {
            color: var(--text-sub);
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .problem-description p {
            margin-bottom: 12px;
        }

        .problem-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }

        .tag {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .tag.easy {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
        }

        .tag.medium {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
        }

        .tag.hard {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        .right-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f8fafc, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .panel {
            background: var(--bg-panel);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .panel h3 {
            margin-bottom: 15px;
            color: var(--text-sub);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
        }

        #input-field {
            width: 100%;
            padding: 14px;
            background: var(--bg-body);
            border: 1px solid var(--border);
            color: white;
            border-radius: 8px;
            font-family: "Fira Code", monospace;
            font-size: 1rem;
            margin-bottom: 10px;
            transition: border-color 0.2s;
        }

        #input-field:focus {
            outline: none;
            border-color: var(--text-sub);
            box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.2);
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .input-field {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-body);
            border: 1px solid var(--border);
            color: white;
            border-radius: 8px;
            font-family: "Fira Code", monospace;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--text-sub);
            box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.2);
        }

        .input-field::placeholder {
            color: #64748b;
            font-style: italic;
        }

        /* === YOUR EXACT ARRAY STYLES === */
        #array-container {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            min-height: 80px;
            justify-content: center;
            align-items: flex-start;
        }

        .array-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .array-box {
            width: 60px;
            height: 60px;
            background: var(--array-bg);
            border: 2px solid var(--array-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .array-idx {
            font-family: "Fira Code", monospace;
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-top: 5px;
        }

        /* === YOUR EXACT STACK STYLES === */
        .stack-wrapper {
            display: flex;
            justify-content: center;
            min-height: 250px;
        }

        .stack-container {
            border-left: 4px solid var(--text-sub);
            border-right: 4px solid var(--text-sub);
            border-bottom: 4px solid var(--text-sub);
            width: 120px;
            min-height: 200px;
            padding: 10px;
            display: flex;
            flex-direction: column-reverse;
            gap: 5px;
            border-radius: 0 0 10px 10px;
        }

        .stack-item {
            height: 40px;
            background: var(--stack-bg);
            border: 2px solid var(--stack-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            animation: dropIn 0.3s ease;
            transition: all 0.3s ease;
        }

        @keyframes dropIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* === POINTERS === */
        #ptr-container {
            display: flex;
            gap: 5px;
            justify-content: center;
            min-height: 30px;
            margin-top: 10px;
        }

        .ptr-indicator {
            font-family: "Fira Code", monospace;
            font-size: 0.9rem;
            color: #f59e0b;
            padding: 4px 12px;
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.4);
            border-radius: 4px;
        }

        /* === LOG === */
        #log-container {
            font-family: "Fira Code", monospace;
            font-size: 1rem;
            color: #fbbf24;
            min-height: 30px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        /* === YOUR EXACT STEP CONTROLS === */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            margin-top: 20px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .step-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
            font-size: 1.2rem;
        }

        .step-btn:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }

        .step-btn:disabled {
            background: rgba(100, 116, 139, 0.3);
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.5;
        }

        /* Auto-play specific styles */
        .separator {
            width: 1px;
            height: 30px;
            background: var(--border);
            margin: 0 5px;
        }

        .autoplay-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .speed-control {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .speed-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 80px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            outline: none;
        }

        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #f59e0b;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .speed-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .speed-label {
            font-family: "Fira Code", monospace;
            font-size: 0.7rem;
            color: var(--text-sub);
        }

        #btn-reset {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-sub);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        #btn-reset:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border-color: var(--text-sub);
        }

        #step-indicator {
            font-family: "Fira Code", monospace;
            font-size: 0.9rem;
            color: var(--text-sub);
            min-width: 100px;
            text-align: center;
        }

        .layout-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .layout-row {
                grid-template-columns: 1fr;
            }
        }

        /* === HASHMAP STYLES === */
        .hashmap-wrapper {
            display: flex;
            justify-content: center;
            min-height: 200px;
        }

        .hashmap-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 280px;
        }

        .hashmap-header {
            display: grid;
            grid-template-columns: 100px 140px;
            gap: 2px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border);
            margin-bottom: 4px;
        }

        .hashmap-header-cell {
            font-family: "Fira Code", monospace;
            font-size: 0.75rem;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 6px 10px;
        }

        .hashmap-row {
            display: grid;
            grid-template-columns: 100px 140px;
            gap: 2px;
            border-radius: 6px;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hashmap-row:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .hashmap-key {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            padding: 10px 12px;
            font-weight: 600;
            font-family: "Fira Code", monospace;
            font-size: 0.9rem;
        }

        .hashmap-value {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 10px 12px;
            font-family: "Fira Code", monospace;
            font-size: 0.9rem;
        }

        .hashmap-empty {
            color: var(--text-sub);
            font-style: italic;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎮 Playground Test</h1>

        <div class="main-layout">
            <!-- Left: Problem Description -->
            <div class="problem-panel">
                <h2><span class="icon">📖</span> <span id="problem-title">Problem</span></h2>
                <div class="problem-description" id="problem-description">
                    <p>Loading problem description...</p>
                </div>
                <div class="problem-tags" id="problem-tags"></div>
            </div>

            <!-- Right: Input + Visualizations -->
            <div class="right-content">
                <div class="panel">
                    <h3>Input</h3>
                    <div id="inputs-container">
                        <!-- Dynamic inputs will be added here -->
                    </div>
                    <button id="btn-reset" onclick="reset()">▶ Start / Reset</button>
                </div>

                <div class="layout-row" id="structures-row">
                    <div class="panel" id="array-panel" style="display: none;">
                        <h3>Array</h3>
                        <div id="array-container"></div>
                        <div id="ptr-container"></div>
                    </div>

                    <div class="panel" id="stack-panel" style="display: none;">
                        <h3>Stack</h3>
                        <div class="stack-wrapper">
                            <div class="stack-container" id="stack-container"></div>
                        </div>
                    </div>

                    <div class="panel" id="queue-panel" style="display: none;">
                        <h3>Queue</h3>
                        <div class="queue-wrapper">
                            <div class="queue-container" id="queue-container"></div>
                        </div>
                    </div>

                    <div class="panel" id="hashmap-panel" style="display: none;">
                        <h3>HashMap</h3>
                        <div class="hashmap-wrapper">
                            <div class="hashmap-container" id="hashmap-container"></div>
                        </div>
                    </div>
                </div>

                <div class="panel">
                    <h3>Log</h3>
                    <div id="log-container">Click "Start" to begin...</div>
                </div>
            </div> <!-- end right-content -->
        </div> <!-- end main-layout -->

        <div class="controls">
            <button class="step-btn" id="btn-prev" disabled>←</button>
            <span id="step-indicator">Step 0</span>
            <button class="step-btn" id="btn-next" disabled>→</button>

            <div class="separator"></div>

            <div class="autoplay-controls">
                <button class="step-btn" id="btn-play"
                    style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">▶</button>
                <div class="speed-control">
                    <input type="range" id="speed-slider" class="speed-slider" min="100" max="2000" value="800"
                        step="100">
                    <span class="speed-label">Speed</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ VISUAL PRIMITIVES (YOUR EXACT STYLES) ============

        const primitives = {
            array: {
                data: [],
                init(vals) {
                    this.data = [...vals];
                    this.render();
                },
                get(i) { return this.data[i]; },
                set(i, v) { this.data[i] = v; this.render(); },
                swap(i, j) {
                    [this.data[i], this.data[j]] = [this.data[j], this.data[i]];
                    this.render();
                },
                highlight(i, color) {
                    const boxes = document.querySelectorAll('.array-box');
                    if (boxes[i]) {
                        boxes[i].style.backgroundColor = color;
                        boxes[i].style.borderColor = color;
                    }
                },
                highlightRange(start, end, color) {
                    for (let i = start; i <= end; i++) this.highlight(i, color);
                },
                clearHighlights() {
                    document.querySelectorAll('.array-box').forEach(b => {
                        b.style.backgroundColor = '';
                        b.style.borderColor = '';
                    });
                },
                get length() { return this.data.length; },
                render() {
                    const container = document.getElementById('array-container');
                    container.innerHTML = this.data.map((v, i) =>
                        `<div class="array-cell">
                            <div class="array-box">${v}</div>
                            <div class="array-idx">${i}</div>
                        </div>`
                    ).join('');
                }
            },

            stack: {
                data: [],
                push(v) { this.data.push(v); this.render(); },
                pop() { const v = this.data.pop(); this.render(); return v; },
                peek() { return this.data[this.data.length - 1]; },
                isEmpty() { return this.data.length === 0; },
                size() { return this.data.length; },
                highlight(i, color) {
                    const items = document.querySelectorAll('.stack-item');
                    if (items[i]) {
                        items[i].style.backgroundColor = color;
                        items[i].style.borderColor = color;
                    }
                },
                clear() { this.data = []; this.render(); },
                render() {
                    const container = document.getElementById('stack-container');
                    container.innerHTML = this.data.map(v =>
                        `<div class="stack-item">${v}</div>`
                    ).join('');
                }
            },

            queue: {
                data: [],
                enqueue(v) { this.data.push(v); },
                dequeue() { return this.data.shift(); },
                peek() { return this.data[0]; },
                isEmpty() { return this.data.length === 0; },
                highlight(i, color) { }
            },

            ptr: {
                pointers: {},
                set(name, idx) {
                    this.pointers[name] = idx;
                    this.render();
                },
                get(name) { return this.pointers[name]; },
                remove(name) {
                    delete this.pointers[name];
                    this.render();
                },
                render() {
                    const container = document.getElementById('ptr-container');
                    container.innerHTML = Object.entries(this.pointers)
                        .map(([name, idx]) => `<div class="ptr-indicator">${name}=${idx}</div>`)
                        .join('');
                }
            },

            hashmap: {
                data: new Map(),
                put(key, val) {
                    this.data.set(key, val);
                    this.render();
                },
                get(key) {
                    return this.data.get(key);
                },
                has(key) {
                    return this.data.has(key);
                },
                remove(key) {
                    this.data.delete(key);
                    this.render();
                },
                clear() {
                    this.data.clear();
                    this.render();
                },
                size() {
                    return this.data.size;
                },
                highlight(key, color) {
                    const rows = document.querySelectorAll('.hashmap-row');
                    rows.forEach(row => {
                        if (row.dataset.key === String(key)) {
                            row.querySelector('.hashmap-key').style.background = color;
                            row.querySelector('.hashmap-value').style.background = color;
                        }
                    });
                },
                clearHighlights() {
                    document.querySelectorAll('.hashmap-key').forEach(el => {
                        el.style.background = '';
                    });
                    document.querySelectorAll('.hashmap-value').forEach(el => {
                        el.style.background = '';
                    });
                },
                render() {
                    const container = document.getElementById('hashmap-container');
                    if (!container) return;

                    if (this.data.size === 0) {
                        container.innerHTML = '<div class="hashmap-empty">Empty HashMap</div>';
                        return;
                    }

                    let html = `
                        <div class="hashmap-header">
                            <div class="hashmap-header-cell">Key</div>
                            <div class="hashmap-header-cell">Value</div>
                        </div>
                    `;

                    // Sort entries for consistent display
                    const entries = [...this.data.entries()].sort((a, b) => {
                        if (typeof a[0] === 'number' && typeof b[0] === 'number') {
                            return a[0] - b[0];
                        }
                        return String(a[0]).localeCompare(String(b[0]));
                    });

                    entries.forEach(([key, val]) => {
                        html += `
                            <div class="hashmap-row" data-key="${key}">
                                <div class="hashmap-key">${key}</div>
                                <div class="hashmap-value">${val}</div>
                            </div>
                        `;
                    });

                    container.innerHTML = html;
                }
            }
        };

        function log(msg) {
            document.getElementById('log-container').textContent = msg;
        }

        // ============ STEP CONTROLLER ============

        let resolveStep = null;
        let stepHistory = [];  // Store state snapshots for prev
        let currentStepIndex = 0;
        let isAutoPlaying = false;
        let autoPlayTimer = null;
        let autoPlayDelay = 800; // Default slow speed

        function updateStepIndicator() {
            document.getElementById('step-indicator').textContent = `Step ${currentStepIndex}`;
        }

        // Capture current highlight states
        function captureHighlights() {
            const arrayHighlights = [];
            document.querySelectorAll('.array-box').forEach((box, i) => {
                arrayHighlights.push({
                    bg: box.style.backgroundColor || '',
                    border: box.style.borderColor || ''
                });
            });

            const stackHighlights = [];
            document.querySelectorAll('.stack-item').forEach((item, i) => {
                stackHighlights.push({
                    bg: item.style.backgroundColor || '',
                    border: item.style.borderColor || ''
                });
            });

            const hashmapHighlights = [];
            document.querySelectorAll('.hashmap-row').forEach((row) => {
                const keyEl = row.querySelector('.hashmap-key');
                const valEl = row.querySelector('.hashmap-value');
                hashmapHighlights.push({
                    key: row.dataset.key,
                    keyBg: keyEl ? keyEl.style.background : '',
                    valBg: valEl ? valEl.style.background : ''
                });
            });

            return { arrayHighlights, stackHighlights, hashmapHighlights };
        }

        // Restore highlight states
        function restoreHighlights(highlights) {
            if (highlights.arrayHighlights) {
                document.querySelectorAll('.array-box').forEach((box, i) => {
                    if (highlights.arrayHighlights[i]) {
                        box.style.backgroundColor = highlights.arrayHighlights[i].bg;
                        box.style.borderColor = highlights.arrayHighlights[i].border;
                    }
                });
            }

            if (highlights.stackHighlights) {
                document.querySelectorAll('.stack-item').forEach((item, i) => {
                    if (highlights.stackHighlights[i]) {
                        item.style.backgroundColor = highlights.stackHighlights[i].bg;
                        item.style.borderColor = highlights.stackHighlights[i].border;
                    }
                });
            }

            if (highlights.hashmapHighlights) {
                document.querySelectorAll('.hashmap-row').forEach((row) => {
                    const match = highlights.hashmapHighlights.find(h => h.key === row.dataset.key);
                    if (match) {
                        const keyEl = row.querySelector('.hashmap-key');
                        const valEl = row.querySelector('.hashmap-value');
                        if (keyEl) keyEl.style.background = match.keyBg;
                        if (valEl) valEl.style.background = match.valBg;
                    }
                });
            }
        }

        function toggleAutoPlay() {
            console.trace("toggleAutoPlay called. Current state:", isAutoPlaying);
            isAutoPlaying = !isAutoPlaying;
            console.log("AutoPlay toggled:", isAutoPlaying);
            const btn = document.getElementById('btn-play');

            if (isAutoPlaying) {
                btn.textContent = '⏸';
                // If we are currently waiting for a step, trigger it immediately (delayed)
                if (resolveStep) {
                    console.log("Triggering next step from toggle");
                    triggerNextStep();
                } else {
                    console.log("Not currently waiting for step, autoplay active for next await");
                }
            } else {
                btn.textContent = '▶';
                if (autoPlayTimer) {
                    clearTimeout(autoPlayTimer);
                    autoPlayTimer = null;
                }
            }
        }

        function triggerNextStep() {
            if (autoPlayTimer) clearTimeout(autoPlayTimer);
            const delay = autoPlayDelay || 800;
            console.log("Scheduling next step in", delay, "ms");

            autoPlayTimer = setTimeout(() => {
                console.log("AutoPlay timer fired. Playing?", isAutoPlaying, "Has resolve?", !!resolveStep);
                if (isAutoPlaying && resolveStep) {
                    document.getElementById('btn-next').disabled = true;
                    resolveStep();
                    resolveStep = null;
                }
            }, delay);
        }

        function awaitStep() {
            return new Promise(resolve => {
                // Save current state snapshot INCLUDING highlights
                const highlights = captureHighlights();
                stepHistory.push({
                    arrayData: [...primitives.array.data],
                    stackData: [...primitives.stack.data],
                    hashmapData: new Map(primitives.hashmap.data),
                    pointers: { ...primitives.ptr.pointers },
                    highlights: highlights
                });
                currentStepIndex++;
                updateStepIndicator();

                resolveStep = resolve;
                document.getElementById('btn-next').disabled = false;
                document.getElementById('btn-prev').disabled = currentStepIndex <= 1;

                if (isAutoPlaying) {
                    console.log("AutoPlay active at awaitStep, triggering next...");
                    triggerNextStep();
                }
            });
        }

        document.getElementById('btn-next').addEventListener('click', () => {
            document.getElementById('btn-next').disabled = true;
            if (resolveStep) {
                resolveStep();
                resolveStep = null;
            }
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            // Pause if playing
            if (isAutoPlaying) {
                toggleAutoPlay();
            }

            if (currentStepIndex <= 1 || stepHistory.length < 2) return;

            // Go back one step
            stepHistory.pop(); // Remove current
            const prevState = stepHistory[stepHistory.length - 1];

            if (prevState) {
                // Restore data state
                primitives.array.data = [...prevState.arrayData];
                primitives.stack.data = [...prevState.stackData];
                primitives.hashmap.data = new Map(prevState.hashmapData);
                primitives.ptr.pointers = { ...prevState.pointers };

                primitives.array.render();
                primitives.stack.render();
                primitives.hashmap.render();
                primitives.ptr.render();

                // Restore highlight state
                restoreHighlights(prevState.highlights);

                currentStepIndex--;
                updateStepIndicator();
                document.getElementById('btn-prev').disabled = currentStepIndex <= 1;
            }
        });

        // Auto-play controls
        document.getElementById('btn-play').addEventListener('click', toggleAutoPlay);

        document.getElementById('speed-slider').addEventListener('input', (e) => {
            // Invert value so higher slider = faster (lower delay)
            // Slider 100-2000.  Map to delay. 
            // We want nice feel. Let's just use raw value but invert definition if needed?
            // Actually, let's keep it simple: slider value IS delay. 
            // So left (low number) is FAST, right (high number) is SLOW.
            // Wait, usually right is faster.
            // Let's do: Delay = Max - Val + Min.
            // Max=2000, Min=100. Val=2000 => Delay=100 (Fast). Val=100 => Delay=2000 (Slow).
            const val = parseInt(e.target.value);
            autoPlayDelay = 2100 - val;
        });

        // ============ PLAYGROUND EXECUTOR ============

        async function runPlayground(code, input) {
            // Reset step tracking
            stepHistory = [];
            currentStepIndex = 0;
            updateStepIndicator();
            document.getElementById('btn-prev').disabled = true;
            document.getElementById('btn-next').disabled = true;

            // Stop any existing autoplay
            isAutoPlaying = false;
            document.getElementById('btn-play').textContent = '▶';
            if (autoPlayTimer) clearTimeout(autoPlayTimer);

            // Reset state
            primitives.array.data = [];
            primitives.stack.data = [];
            primitives.hashmap.data.clear();
            primitives.ptr.pointers = {};
            primitives.array.render();
            primitives.stack.render();
            primitives.hashmap.render();
            primitives.ptr.render();

            // Create Playground class from code string
            const PlaygroundClass = new Function('return ' + code)();
            const playground = new PlaygroundClass();

            // Inject primitives
            playground.array = primitives.array;
            playground.stack = primitives.stack;
            playground.queue = primitives.queue;
            playground.hashmap = primitives.hashmap;
            playground.ptr = primitives.ptr;
            playground.log = log;
            playground.await = awaitStep;

            // Run!
            log('Starting...');
            try {
                const result = await playground.run(input);

                // Save final state so we can go back
                stepHistory.push({
                    arrayData: [...primitives.array.data],
                    stackData: [...primitives.stack.data],
                    pointers: { ...primitives.ptr.pointers }
                });
                currentStepIndex++;
                updateStepIndicator();

                // Keep prev button enabled so we can review
                document.getElementById('btn-prev').disabled = stepHistory.length <= 1;
                document.getElementById('btn-next').disabled = true;

                log(`✅ Finished! Result: ${result}`);
            } catch (e) {
                log(`❌ Error: ${e.message}`);
                console.error(e);
            }
        }

        // ============ LOAD PLACEHOLDER ============

        let playgroundCode = null;
        let playgroundStructures = [];

        // Show only the panels needed
        function updateVisiblePanels(structures) {
            // Hide all panels first
            document.getElementById('array-panel').style.display = 'none';
            document.getElementById('stack-panel').style.display = 'none';
            document.getElementById('queue-panel').style.display = 'none';
            document.getElementById('hashmap-panel').style.display = 'none';

            // Normalize structure names (hashmap-simple -> hashmap)
            const normalizedStructures = structures.map(s =>
                s === 'hashmap-simple' ? 'hashmap' : s
            );

            // Show needed panels
            normalizedStructures.forEach(s => {
                const panel = document.getElementById(`${s}-panel`);
                if (panel) panel.style.display = 'block';
            });

            // Update grid columns based on visible panels
            const visibleCount = normalizedStructures.filter(s =>
                ['array', 'stack', 'queue', 'hashmap'].includes(s)
            ).length;

            const row = document.getElementById('structures-row');
            if (visibleCount === 1) {
                row.style.gridTemplateColumns = '1fr';
            } else if (visibleCount === 2) {
                row.style.gridTemplateColumns = '1fr 1fr';
            } else {
                row.style.gridTemplateColumns = '1fr 1fr 1fr';
            }
        }

        let playgroundInputs = [];

        fetch('placeholder.json')
            .then(r => r.json())
            .then(data => {
                playgroundCode = data.code;
                playgroundStructures = data.structures || [];
                playgroundInputs = data.inputs || [];
                updateVisiblePanels(playgroundStructures);

                // Build input fields from JSON config
                buildInputFields(playgroundInputs);

                // Populate problem description
                document.getElementById('problem-title').textContent = data.name || 'Problem';

                if (data.description) {
                    document.getElementById('problem-description').innerHTML = data.description;
                } else {
                    document.getElementById('problem-description').innerHTML = '<p>No description provided.</p>';
                }

                // Build tags
                const tagsContainer = document.getElementById('problem-tags');
                tagsContainer.innerHTML = '';

                if (data.difficulty) {
                    const diffTag = document.createElement('span');
                    diffTag.className = `tag ${data.difficulty.toLowerCase()}`;
                    diffTag.textContent = data.difficulty;
                    tagsContainer.appendChild(diffTag);
                }

                if (data.tags) {
                    data.tags.forEach(tag => {
                        const tagEl = document.createElement('span');
                        tagEl.className = 'tag';
                        tagEl.textContent = tag;
                        tagsContainer.appendChild(tagEl);
                    });
                }

                log('✓ Loaded! Click "Start" to begin.');
            })
            .catch(e => {
                log('❌ Failed to load placeholder.json');
                console.error(e);
            });

        function buildInputFields(inputs) {
            const container = document.getElementById('inputs-container');
            container.innerHTML = '';

            if (inputs.length === 0) {
                // Fallback: single generic input
                container.innerHTML = `
                    <div class="input-group">
                        <label class="input-label">Input</label>
                        <input type="text" class="input-field" id="input-0" placeholder="Enter values...">
                    </div>
                `;
                return;
            }

            inputs.forEach((inp, idx) => {
                const group = document.createElement('div');
                group.className = 'input-group';

                const label = document.createElement('label');
                label.className = 'input-label';
                label.textContent = inp.label || `Input ${idx + 1}`;
                label.setAttribute('for', `input-${idx}`);

                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'input-field';
                input.id = `input-${idx}`;
                input.placeholder = inp.placeholder || '';
                if (inp.default !== undefined) {
                    input.value = inp.default;
                }

                group.appendChild(label);
                group.appendChild(input);
                container.appendChild(group);
            });
        }

        function reset() {
            if (!playgroundCode) {
                log('Still loading...');
                return;
            }

            // Collect all input values
            const inputValues = [];
            const inputFields = document.querySelectorAll('#inputs-container .input-field');
            inputFields.forEach(field => {
                inputValues.push(field.value);
            });

            runPlayground(playgroundCode, inputValues);
        }
    </script>
</body>

</html>
