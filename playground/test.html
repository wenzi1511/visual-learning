<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playground Test Runner</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        /* === USING YOUR EXACT THEME === */
        :root {
            --bg-body: #0f172a;
            --bg-panel: #1e293b;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --border: #334155;
            /* Node Colors */
            --node-bg: #1e293b;
            --node-border: #64748b;
            /* Simple Structs - YOUR COLORS */
            --array-bg: #064e3b;
            --array-border: #34d399;
            --stack-bg: #0c4a6e;
            --stack-border: #38bdf8;
            --queue-bg: #831843;
            --queue-border: #f472b6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px 24px;
            padding-bottom: 110px;
            /* Space for fixed controls */
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Main two-column layout */
        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            align-items: start;
            transition: grid-template-columns 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .main-layout.sidebar-collapsed {
            grid-template-columns: 0px 1fr;
            gap: 0px;
        }

        @media (max-width: 1000px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        /* Left column - stacks problem + input */
        .left-column {
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: sticky;
            top: 20px;
            overflow: hidden;
            transition: opacity 0.3s ease, transform 0.3s ease;
            min-width: 0;
        }

        .sidebar-collapsed .left-column {
            opacity: 0;
            transform: translateX(-20px);
            pointer-events: none;
        }

        /* Sidebar toggle button */
        .sidebar-toggle {
            position: fixed;
            top: 64px;
            left: 20px;
            z-index: 1001;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            color: var(--text-sub);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.25s ease;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        .sidebar-toggle:hover {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border-color: #3b82f6;
            transform: scale(1.08);
        }

        .sidebar-toggle .arrow {
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .sidebar-collapsed .sidebar-toggle .arrow {
            transform: rotate(180deg);
        }

        /* Problem description panel */
        .problem-panel {
            background: var(--bg-panel);
            border-radius: 14px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .problem-panel h2 {
            font-size: 1.15rem;
            margin-bottom: 14px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .problem-panel h2 .icon {
            font-size: 1.3rem;
        }

        .problem-description {
            color: var(--text-sub);
            line-height: 1.6;
            font-size: 0.88rem;
        }

        .problem-description p {
            margin-bottom: 10px;
        }

        .problem-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }

        .tag {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .tag.easy {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
        }

        .tag.medium {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
        }

        .tag.hard {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        .right-content {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        h1 {
            text-align: center;
            margin-bottom: 16px;
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f8fafc, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .panel {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.95) 0%, rgba(15, 23, 42, 0.9) 100%);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 0;
            border: 1px solid rgba(100, 116, 139, 0.3);
            box-shadow:
                0 4px 20px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset,
                0 1px 0 rgba(255, 255, 255, 0.1) inset;
            backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        }

        .panel h3 {
            margin-bottom: 16px;
            color: #e2e8f0;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel h3::before {
            content: '';
            width: 4px;
            height: 14px;
            background: linear-gradient(180deg, #3b82f6, #8b5cf6);
            border-radius: 2px;
        }

        #input-field {
            width: 100%;
            padding: 14px;
            background: var(--bg-body);
            border: 1px solid var(--border);
            color: white;
            border-radius: 8px;
            font-family: "Fira Code", monospace;
            font-size: 1rem;
            margin-bottom: 10px;
            transition: border-color 0.2s;
        }

        #input-field:focus {
            outline: none;
            border-color: var(--text-sub);
            box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.2);
        }

        .input-group {
            margin-bottom: 10px;
        }

        .input-label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-field {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-body);
            border: 1px solid var(--border);
            color: white;
            border-radius: 8px;
            font-family: "Fira Code", monospace;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--text-sub);
            box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.2);
        }

        .input-field::placeholder {
            color: #64748b;
            font-style: italic;
        }

        /* === SLOT CONTENT STYLES === */
        .slot-content {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            min-height: 240px;
            justify-content: center;
            align-items: center;
            padding: 24px 20px;
            /* RESIZABLE */
            resize: both;
            overflow: auto;
            border: 1px dashed rgba(100, 116, 139, 0.3);
            border-radius: 8px;
            position: relative;
            scrollbar-width: none;
            /* Firefox */
            -ms-overflow-style: none;
            /* IE/Edge */
        }

        .slot-content::-webkit-scrollbar {
            display: none;
            /* Chrome/Safari */
        }

        /* Hide scrollbars for all data structure wrappers */
        .sll-wrapper,
        .dll-wrapper,
        .uf-wrapper,
        .bt-wrapper,
        .heap-wrapper,
        .graph-wrapper,
        .trie-wrapper {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .sll-wrapper::-webkit-scrollbar,
        .dll-wrapper::-webkit-scrollbar,
        .uf-wrapper::-webkit-scrollbar,
        .bt-wrapper::-webkit-scrollbar,
        .heap-wrapper::-webkit-scrollbar,
        .graph-wrapper::-webkit-scrollbar,
        .trie-wrapper::-webkit-scrollbar {
            display: none;
        }

        .ptr-container-global {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 16px;
        }

        .array-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s ease;
        }

        .array-cell:hover {
            transform: translateY(-3px);
        }

        .array-box {
            width: 76px;
            height: 76px;
            background: linear-gradient(145deg, rgba(6, 78, 59, 0.9), rgba(6, 78, 59, 0.7));
            border: 2px solid var(--array-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.5rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 14px;
            box-shadow:
                0 4px 12px rgba(52, 211, 153, 0.2),
                0 0 0 1px rgba(52, 211, 153, 0.1) inset,
                0 2px 0 rgba(255, 255, 255, 0.1) inset;
            position: relative;
            overflow: hidden;
        }

        .array-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent);
            border-radius: 10px 10px 0 0;
        }

        .array-box:hover {
            transform: scale(1.05);
            box-shadow:
                0 8px 24px rgba(52, 211, 153, 0.3),
                0 0 0 1px rgba(52, 211, 153, 0.2) inset,
                0 2px 0 rgba(255, 255, 255, 0.15) inset;
            border-color: #6ee7b7;
        }

        .array-idx {
            font-family: "Fira Code", monospace;
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 12px;
            background: rgba(100, 116, 139, 0.15);
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: 500;
        }

        /* === PREMIUM STACK STYLES === */
        .stack-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            min-height: 300px;
            padding: 20px;
        }

        .stack-container {
            position: relative;
            border-left: 3px solid #64748b;
            border-right: 3px solid #64748b;
            border-bottom: 3px solid #64748b;
            width: 180px;
            min-height: 280px;
            padding: 18px;
            display: flex;
            flex-direction: column-reverse;
            gap: 12px;
            border-radius: 0 0 18px 18px;
            background: linear-gradient(180deg, transparent 0%, rgba(12, 74, 110, 0.1) 100%);
            box-shadow:
                0 8px 24px rgba(0, 0, 0, 0.3),
                inset 0 -20px 40px rgba(12, 74, 110, 0.1);
        }

        .stack-container::before {
            content: 'STACK';
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: #64748b;
            letter-spacing: 3px;
            font-weight: 600;
        }

        .stack-item {
            height: 56px;
            background: linear-gradient(145deg, rgba(12, 74, 110, 0.95), rgba(12, 74, 110, 0.75));
            border: 2px solid var(--stack-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.35rem;
            animation: stackDropIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            transition: all 0.25s ease;
            border-radius: 12px;
            box-shadow:
                0 3px 10px rgba(56, 189, 248, 0.2),
                0 0 0 1px rgba(56, 189, 248, 0.1) inset,
                0 1px 0 rgba(255, 255, 255, 0.1) inset;
            position: relative;
            overflow: hidden;
        }

        .stack-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent);
            border-radius: 8px 8px 0 0;
        }

        .stack-item:hover {
            transform: scale(1.03);
            box-shadow:
                0 6px 20px rgba(56, 189, 248, 0.35),
                0 0 0 1px rgba(56, 189, 248, 0.2) inset;
        }

        @keyframes stackDropIn {
            0% {
                opacity: 0;
                transform: translateY(-30px) scale(0.9);
            }

            70% {
                transform: translateY(5px) scale(1.02);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes dropIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* === PREMIUM GRID STYLES === */
        .grid-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .grid-container {
            display: inline-grid;
            gap: 3px;
            padding: 14px;
            background: rgba(30, 41, 59, 0.6);
            border-radius: 14px;
            border: 1px solid rgba(100, 116, 139, 0.3);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
        }

        .grid-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-family: "Fira Code", monospace;
            border-radius: 8px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            user-select: none;
        }

        .grid-cell::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent);
            border-radius: 6px 6px 0 0;
        }

        .grid-cell:hover {
            transform: scale(1.08);
            z-index: 10;
        }

        .grid-idx-header {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Fira Code", monospace;
            color: #64748b;
            font-weight: 500;
            user-select: none;
        }

        .grid-idx-row {
            justify-content: flex-end;
            padding-right: 6px;
        }

        .grid-cell.cell-true {
            background: linear-gradient(145deg, rgba(16, 185, 129, 0.85), rgba(5, 150, 105, 0.75));
            border: 2px solid #34d399;
            color: #ffffff;
            box-shadow: 0 2px 12px rgba(16, 185, 129, 0.3);
        }

        .grid-cell.cell-false {
            background: linear-gradient(145deg, rgba(239, 68, 68, 0.7), rgba(185, 28, 28, 0.6));
            border: 2px solid #f87171;
            color: #ffffff;
            box-shadow: 0 2px 12px rgba(239, 68, 68, 0.25);
        }

        .grid-cell.cell-empty {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.8));
            border: 2px solid rgba(100, 116, 139, 0.4);
            color: #64748b;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .grid-cell.cell-filled {
            background: linear-gradient(145deg, rgba(59, 130, 246, 0.8), rgba(37, 99, 235, 0.7));
            border: 2px solid rgba(96, 165, 250, 0.7);
            color: #ffffff;
            box-shadow: 0 2px 12px rgba(59, 130, 246, 0.3);
        }

        /* === PREMIUM QUEUE STYLES === */
        .queue-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
            padding: 20px;
        }

        .queue-vis-container {
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 18px 24px;
            border-top: 3px solid #64748b;
            border-bottom: 3px solid #64748b;
            min-width: 160px;
            min-height: 80px;
            background: linear-gradient(90deg, rgba(131, 24, 67, 0.08) 0%, rgba(131, 24, 67, 0.04) 100%);
            border-radius: 0;
        }

        .queue-vis-container::before {
            content: 'FRONT';
            position: absolute;
            bottom: -22px;
            left: 8px;
            font-size: 0.6rem;
            color: #f472b6;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .queue-vis-container::after {
            content: 'REAR';
            position: absolute;
            bottom: -22px;
            right: 8px;
            font-size: 0.6rem;
            color: #f472b6;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .queue-vis-item {
            width: 64px;
            height: 64px;
            background: linear-gradient(145deg, rgba(131, 24, 67, 0.9), rgba(131, 24, 67, 0.7));
            border: 2px solid var(--queue-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            border-radius: 12px;
            animation: queueSlideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            transition: all 0.25s ease;
            box-shadow:
                0 3px 10px rgba(244, 114, 182, 0.2),
                0 0 0 1px rgba(244, 114, 182, 0.1) inset,
                0 1px 0 rgba(255, 255, 255, 0.1) inset;
            position: relative;
            overflow: hidden;
        }

        .queue-vis-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent);
            border-radius: 8px 8px 0 0;
        }

        .queue-vis-item:hover {
            transform: scale(1.06);
            box-shadow:
                0 6px 20px rgba(244, 114, 182, 0.35),
                0 0 0 1px rgba(244, 114, 182, 0.2) inset;
        }

        @keyframes queueSlideIn {
            0% {
                opacity: 0;
                transform: translateX(30px) scale(0.9);
            }

            70% {
                transform: translateX(-4px) scale(1.02);
            }

            100% {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        /* === POINTER INDICATORS === */
        #ptr-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            min-height: 40px;
            margin-top: 8px;
        }

        .ptr-indicator {
            font-family: "Fira Code", monospace;
            font-size: 0.85rem;
            color: #fbbf24;
            padding: 6px 16px;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(245, 158, 11, 0.1));
            border: 1px solid rgba(245, 158, 11, 0.5);
            border-radius: 20px;
            box-shadow:
                0 2px 8px rgba(245, 158, 11, 0.15),
                0 0 0 1px rgba(245, 158, 11, 0.05) inset;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        .ptr-indicator:hover {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.3), rgba(245, 158, 11, 0.15));
            transform: translateY(-2px);
            box-shadow:
                0 4px 12px rgba(245, 158, 11, 0.25),
                0 0 0 1px rgba(245, 158, 11, 0.1) inset;
        }

        /* === LOG PANEL === */
        #log-container {
            font-family: "Fira Code", monospace;
            font-size: 0.95rem;
            color: #fbbf24;
            min-height: 40px;
            padding: 14px 18px;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.2));
            border-radius: 12px;
            border: 1px solid rgba(251, 191, 36, 0.2);
            box-shadow:
                0 4px 16px rgba(0, 0, 0, 0.2),
                0 0 0 1px rgba(255, 255, 255, 0.03) inset;
            line-height: 1.5;
        }

        /* === YOUR EXACT STEP CONTROLS === */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(12px);
            padding: 10px 24px;
            border-radius: 50px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            /* Fixed at bottom */
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }

        .step-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
            font-size: 1.1rem;
        }

        .step-btn:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }

        .step-btn:disabled {
            background: rgba(100, 116, 139, 0.3);
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.5;
        }

        /* Auto-play specific styles */
        .separator {
            width: 1px;
            height: 30px;
            background: var(--border);
            margin: 0 5px;
        }

        .autoplay-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .speed-control {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .speed-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 80px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            outline: none;
        }

        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #f59e0b;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .speed-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .speed-label {
            font-family: "Fira Code", monospace;
            font-size: 0.7rem;
            color: var(--text-sub);
        }

        #btn-reset {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-sub);
            padding: 10px 20px;
            border-radius: 8px;

        #btn-reset:hover {
            background: rgba(255, 255, 255, 0.1);

        #step-indicator {
            font-family: "Fira Code", monospace;
            font-size: 0.9rem;

        }

        .layout-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            flex: 1;
        }

        @media (max-width: 768px) {
            .layout-row {
                grid-template-columns: 1fr;
            }
        }

        /* === PREMIUM HASHMAP STYLES === */
        .hashmap-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 220px;
            padding: 20px;
        }

        .hashmap-container {
            display: flex;

            min-width: 360px;
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.5), rgba(15, 23, 42, 0.3));

            border: 1px solid rgba(100, 116, 139, 0.2);

        .hashmap-header {
            display: grid;
            grid-template-columns: 130px 190px;

        .hashmap-header-cell {
            font-family: "Fira Code", monospace;
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 10px 14px;
            font-weight: 600;
        }

        .hashmap-row {
            display: grid;
            grid-template-columns: 130px 190px;
            gap: 6px;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .hashmap-row:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow:
                0 8px 24px rgba(59, 130, 246, 0.25),
                0 4px 12px rgba(0, 0, 0, 0.3);
        }

        .hashmap-key {
            background: linear-gradient(145deg, #3b82f6, #2563eb);
            color: white;
            padding: 14px 16px;
            font-weight: 700;
            font-family: "Fira Code", monospace;
            font-size: 1.1rem;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;

        .hashmap-key::before {
            content: '';

            left: 0;

            background: linear-gradient(180deg, rgba(255, 255, 255, 0.15), transparent);
        }

        .hashmap-value {
            background: linear-gradient(145deg, #10b981, #059669);
            color: white;
            padding: 14px 16px;
            font-family: "Fira Code", monospace;
            font-size: 1.1rem;
            font-weight: 600;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hashmap-value::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent);
        }

        .hashmap-empty {
            color: #64748b;
            font-style: italic;
            text-align: center;
            padding: 30px 20px;
            font-size: 0.95rem;
        }

        .home-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            color: var(--text-sub);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.25s ease;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);

        }

        .layout-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            flex: 1;
        }

        /* Allow slot panels to be resizable */
        #slots-container .panel {
            resize: both;
            overflow: auto;
            min-height: 300px;
            min-width: 400px;

        }

        .home-btn:hover {

            border-color: #3b82f6;
            transform: scale(1.08);
        }
    </style>
</head>

<body>
    <a href="../index.html" class="home-btn" title="Back to Home">🏠</a>
    <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">
        <span class="arrow">◀</span>
    </button>

    <div class="container">
        <h1>Playground Test</h1>

        <div class="main-layout" id="main-layout">
            <!-- Left: Problem Description + Input -->
            <div class="left-column">
                <div class="problem-panel">
                    <h2><span class="icon">📖</span> <span id="problem-title">Problem</span></h2>
                    <div class="problem-description" id="problem-description">
                        <p>Loading problem description...</p>
                    </div>
                    <div class="problem-tags" id="problem-tags"></div>
                </div>

                <div class="panel" id="input-panel">
                    <h3>Input</h3>
                    <div id="inputs-container">
                        <!-- Dynamic inputs will be added here -->
                    </div>
                    <button id="btn-reset" onclick="reset()">▶ Start / Reset</button>
                </div>
            </div>

            <!-- Right: Data Structures + Pointer + Log -->
            <div class="right-content">
                <!-- Data structure slots -->
                <div class="layout-row" id="slots-container">
                    <!-- Dynamic slots will be created here based on JSON config -->
                </div>

                <!-- Pointer indicators -->
                <div id="ptr-container" class="ptr-container-global"></div>

                <div class="panel log-panel">
                    <h3>Log</h3>
                    <div id="log-container">Click "Start" to begin...</div>
                </div>
            </div> <!-- end right-content -->
        </div> <!-- end main-layout -->

        <div class="controls">
            <button class="step-btn" id="btn-prev" disabled>←</button>
            <span id="step-indicator">Step 0</span>
            <button class="step-btn" id="btn-next" disabled>→</button>

            <div class="separator"></div>

            <div class="autoplay-controls">
                <button class="step-btn" id="btn-play"
                    style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">▶</button>
                <div class="speed-control">
                    <input type="range" id="speed-slider" class="speed-slider" min="100" max="2000" value="800"
                        step="100">
                    <span class="speed-label">Speed</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ SIDEBAR TOGGLE ============
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const mainLayout = document.getElementById('main-layout');

        // Check saved state
        const sidebarState = localStorage.getItem('playground-sidebar');
        if (sidebarState === 'collapsed') {
            mainLayout.classList.add('sidebar-collapsed');
        }

        sidebarToggle.addEventListener('click', () => {
            mainLayout.classList.toggle('sidebar-collapsed');
            const isCollapsed = mainLayout.classList.contains('sidebar-collapsed');
            localStorage.setItem('playground-sidebar', isCollapsed ? 'collapsed' : 'expanded');
        });

        // ============ SLOT-BASED DYNAMIC PRIMITIVES ============

        // Active slots registry - stores all slot instances
        let activeSlots = {};

        // Factory functions to create primitives for a specific slot
        const createArrayPrimitive = (slotId) => ({
            slotId,
            data: [],
            init(vals) {
                this.data = [...vals];
                this.render();
            },
            get(i) { return this.data[i]; },
            set(i, v) { this.data[i] = v; this.render(); },
            swap(i, j) {
                [this.data[i], this.data[j]] = [this.data[j], this.data[i]];
                this.render();
            },
            push(v) {
                this.data.push(v);
                this.render();
            },
            pop() {
                const v = this.data.pop();
                this.render();
                return v;
            },
            highlight(i, color) {
                const container = document.getElementById(`slot-${this.slotId}-content`);
                const boxes = container.querySelectorAll('.array-box');
                if (boxes[i]) {
                    boxes[i].style.backgroundColor = color;
                    boxes[i].style.borderColor = color;
                }
            },
            highlightRange(start, end, color) {
                for (let i = start; i <= end; i++) this.highlight(i, color);
            },
            clearHighlights() {
                const container = document.getElementById(`slot-${this.slotId}-content`);
                container.querySelectorAll('.array-box').forEach(b => {
                    b.style.backgroundColor = '';
                    b.style.borderColor = '';
                });
            },
            get length() { return this.data.length; },
            render() {
                const container = document.getElementById(`slot-${this.slotId}-content`);
                if (!container) return;
                container.innerHTML = this.data.map((v, i) =>
                    `<div class="array-cell">
                        <div class="array-box">${v}</div>
                        <div class="array-idx">${i}</div>
                    </div>`
                ).join('');
            },
            clone() {
                return { data: [...this.data] };
            },
            restore(state) {
                this.data = [...state.data];
                this.render();
            }
        });

        const createStackPrimitive = (slotId) => ({
            slotId,
            data: [],
            init(arr) {
                this.data = [...arr];
                this.render();
            },
            push(v) { this.data.push(v); this.render(); },
            pop() { const v = this.data.pop(); this.render(); return v; },
            peek() { return this.data[this.data.length - 1]; },
            isEmpty() { return this.data.length === 0; },
            size() { return this.data.length; },
            highlight(i, color) {
                const container = document.getElementById(`slot-${this.slotId}-content`);
                const items = container.querySelectorAll('.stack-item');
                if (items[i]) {
                    items[i].style.backgroundColor = color;
                    items[i].style.borderColor = color;
                }
            },
            clear() { this.data = []; this.render(); },
            render() {
                const container = document.getElementById(`slot-${this.slotId}-content`);
                if (!container) return;
                container.innerHTML = `<div class="stack-wrapper"><div class="stack-container">` +
                    this.data.map(v => `<div class="stack-item">${v}</div>`).join('') +
                    `</div></div>`;
            },
            clone() {
                return { data: [...this.data] };
            },
            restore(state) {
                this.data = [...state.data];
                this.render();
            }
        });

        const createHashmapPrimitive = (slotId) => ({
            slotId,
            data: new Map(),
            put(key, val) {
                this.data.set(key, val);
                this.render();
            },
            init(entries) {
                this.data = new Map(entries);
                this.render();
            },
            get(key) {
                return this.data.get(key);
            },
            has(key) {
                return this.data.has(key);
            },
            remove(key) {
                this.data.delete(key);
                this.render();
            },
            clear() {
                this.data.clear();
                this.render();
            },
            size() {
                return this.data.size;
            },
            highlight(key, color) {
                const container = document.getElementById(`slot-${this.slotId}-content`);
                container.querySelectorAll('.hashmap-row').forEach(row => {
                    if (row.dataset.key === String(key)) {
                        row.querySelector('.hashmap-key').style.background = color;
                        row.querySelector('.hashmap-value').style.background = color;
                    }
                });
            },
            clearHighlights() {
                const container = document.getElementById(`slot-${this.slotId}-content`);
                container.querySelectorAll('.hashmap-key').forEach(el => el.style.background = '');
                container.querySelectorAll('.hashmap-value').forEach(el => el.style.background = '');
            },
            render() {
                const container = document.getElementById(`slot-${this.slotId}-content`);
                if (!container) return;

                if (this.data.size === 0) {
                    container.innerHTML = '<div class="hashmap-wrapper"><div class="hashmap-container"><div class="hashmap-empty">Empty</div></div></div>';
                    return;
                }

                const entries = [...this.data.entries()].sort((a, b) => {
                    if (typeof a[0] === 'number' && typeof b[0] === 'number') return a[0] - b[0];
                    return String(a[0]).localeCompare(String(b[0]));
                });

                let html = `<div class="hashmap-wrapper"><div class="hashmap-container">
                    <div class="hashmap-header">
                        <div class="hashmap-header-cell">Key</div>
                        <div class="hashmap-header-cell">Value</div>
                    </div>`;

                entries.forEach(([key, val]) => {
                    html += `<div class="hashmap-row" data-key="${key}">
                        <div class="hashmap-key">${key}</div>
                        <div class="hashmap-value">${val}</div>
                    </div>`;
                });

                container.innerHTML = html + `</div></div>`;
            },
            clone() {
                // Convert Map to array of entries for reliable cloning
                return { entries: [...this.data.entries()] };
            },
            restore(state) {
                // Restore from array of entries
                this.data = new Map(state.entries);
                this.render();
            }
        });

        const createGridPrimitive = (slotId) => ({
            slotId,
            data: [],
            init(matrix) {
                this.data = matrix.map(row => [...row]);
                this.render();
            },
            get rows() { return this.data.length; },
            get cols() { return this.data.length > 0 ? this.data[0].length : 0; },
            getCell(r, c) {
                if (r < 0 || r >= this.rows || c < 0 || c >= this.cols) return undefined;
                return this.data[r][c];
            },
            setCell(r, c, val) {
                if (r < 0 || r >= this.rows || c < 0 || c >= this.cols) return;
                this.data[r][c] = val;
                this.render();
            },
            highlight(r, c, color) {
                const container = document.getElementById(`slot-${this.slotId}-content`);
                if (!container) return;
                const cells = container.querySelectorAll('.grid-cell');
                cells.forEach(cell => {
                    if (parseInt(cell.dataset.row) === r && parseInt(cell.dataset.col) === c) {
                        cell.style.backgroundColor = color;
                        cell.style.borderColor = color;
                        cell.style.boxShadow = `0 4px 20px ${color}66`;
                    }
                });
            },
            clearHighlights() {
                this.render();
            },
            render() {
                const container = document.getElementById(`slot-${this.slotId}-content`);
                if (!container) return;
                const rows = this.data.length;
                const cols = rows > 0 ? this.data[0].length : 0;
                if (rows === 0 || cols === 0) {
                    container.innerHTML = '<div class="grid-wrapper"><div class="grid-container">Empty</div></div>';
                    return;
                }
                const maxCellSize = 64;
                const minCellSize = 36;
                const cellSize = Math.max(minCellSize, Math.min(maxCellSize, Math.floor(360 / Math.max(rows, cols))));
                const fontSize = cellSize > 44 ? '0.9rem' : '0.7rem';
                const idxSize = '0.65rem';

                // Grid with extra column for row indices and extra row for col indices
                let html = `<div class="grid-wrapper"><div class="grid-container" style="grid-template-columns: 24px repeat(${cols}, ${cellSize}px); grid-template-rows: 20px repeat(${rows}, ${cellSize}px);">`;

                // Top-left corner (empty)
                html += `<div style="width:24px;height:20px;"></div>`;
                // Column headers (j)
                for (let c = 0; c < cols; c++) {
                    html += `<div class="grid-idx-header" style="width:${cellSize}px;height:20px;font-size:${idxSize};">${c}</div>`;
                }

                for (let r = 0; r < rows; r++) {
                    // Row header (i)
                    html += `<div class="grid-idx-header grid-idx-row" style="width:24px;height:${cellSize}px;font-size:${idxSize};">${r}</div>`;
                    for (let c = 0; c < cols; c++) {
                        const val = this.data[r][c];
                        let cellClass = 'grid-cell ';
                        let displayVal = val;
                        if (val === true) {
                            cellClass += 'cell-true';
                            displayVal = '✓';
                        } else if (val === false) {
                            cellClass += 'cell-false';
                            displayVal = '✗';
                        } else if (val === 0 || val === '0') {
                            cellClass += 'cell-empty';
                        } else {
                            cellClass += 'cell-filled';
                        }
                        html += `<div class="${cellClass}" data-row="${r}" data-col="${c}" style="width:${cellSize}px;height:${cellSize}px;font-size:${fontSize};">${displayVal}</div>`;
                    }
                }
                html += '</div></div>';
                container.innerHTML = html;
            },
            clone() {
                return { data: this.data.map(row => [...row]) };
            },
            restore(state) {
                this.data = state.data.map(row => [...row]);
                this.render();
            }
        });

        const createQueuePrimitive = (slotId) => ({
            slotId,
            data: [],
            enqueue(v) { this.data.push(v); this.render(); },
            dequeue() { const v = this.data.shift(); this.render(); return v; },
            peek() { return this.data[0]; },
            isEmpty() { return this.data.length === 0; },
            size() { return this.data.length; },
            init(arr) { this.data = [...arr]; this.render(); },
            highlight(i, color) {
                const container = document.getElementById(`slot-${this.slotId}-content`);
                const items = container.querySelectorAll('.queue-vis-item');
                if (items[i]) {
                    items[i].style.backgroundColor = color;
                    items[i].style.borderColor = color;
                }
            },
            clearHighlights() {
                const container = document.getElementById(`slot-${this.slotId}-content`);
                container.querySelectorAll('.queue-vis-item').forEach(item => {
                    item.style.backgroundColor = '';
                    item.style.borderColor = '';
                });
            },
            clear() { this.data = []; this.render(); },
            render() {
                const container = document.getElementById(`slot-${this.slotId}-content`);
                if (!container) return;
                if (this.data.length === 0) {
                    container.innerHTML = '<div class="queue-wrapper"><div class="queue-vis-container" style="justify-content:center;color:#64748b;font-style:italic;">Empty</div></div>';
                    return;
                }
                container.innerHTML = '<div class="queue-wrapper"><div class="queue-vis-container">' +
                    this.data.map(v => `<div class="queue-vis-item">${v}</div>`).join('') +
                    '</div></div>';
            },
            clone() {
                return { data: [...this.data] };
            },
            restore(state) {
                this.data = [...state.data];
                this.render();
            }
        });

        // Pointer primitive (shared across all slots)
        const ptrPrimitive = {
            pointers: {},
            set(name, idx) {
                this.pointers[name] = idx;
                this.render();
            },
            get(name) { return this.pointers[name]; },
            remove(name) {
                delete this.pointers[name];
                this.render();
            },
            clear() {
                this.pointers = {};
                this.render();
            },
            render() {
                const container = document.getElementById('ptr-container');
                if (!container) return;
                container.innerHTML = Object.entries(this.pointers)
                    .map(([name, idx]) => `<div class="ptr-indicator">${name}=${idx}</div>`)
                    .join('');
            },
            clone() {
                return { pointers: { ...this.pointers } };
            },
            restore(state) {
                this.pointers = { ...state.pointers };
                this.render();
            }
        };

        // Build slots from JSON config
        function buildSlots(slots) {
            const slotsContainer = document.getElementById('slots-container');
            // Keep the input panel where it is (in left column)
            const inputPanel = document.getElementById('input-panel');
            const leftColumn = document.querySelector('.left-column');

            // Safety check: if input panel was previously moved to slots container (by buggy code), move it back
            if (inputPanel && inputPanel.parentElement !== leftColumn) {
                leftColumn.appendChild(inputPanel);
            }

            slotsContainer.innerHTML = '';
            activeSlots = {};

            if (!slots || slots.length === 0) {
                slotsContainer.style.gridTemplateColumns = '1fr';
                return;
            }

            // Set grid columns based on number of slots
            const totalCols = Math.min(slots.length, 3);
            slotsContainer.style.gridTemplateColumns = `repeat(${totalCols}, 1fr)`;

            slots.forEach((slot, idx) => {
                const slotId = slot.id || `slot${idx}`;
                const slotType = slot.type || 'array';
                const slotLabel = slot.label || slotType.charAt(0).toUpperCase() + slotType.slice(1);

                // Create panel HTML
                const panel = document.createElement('div');
                panel.className = 'panel';
                panel.id = `slot-${slotId}-panel`;
                panel.innerHTML = `
                    <h3>${slotLabel}</h3>
                    <div id="slot-${slotId}-content" class="slot-content"></div>
                `;
                slotsContainer.appendChild(panel);

                // Create primitive instance based on type
                let primitive;
                switch (slotType) {
                    case 'array':
                        primitive = createArrayPrimitive(slotId);
                        break;
                    case 'stack':
                        primitive = createStackPrimitive(slotId);
                        break;
                    case 'hashmap':
                    case 'hashmap-simple':
                        primitive = createHashmapPrimitive(slotId);
                        break;
                    case 'grid':
                        primitive = createGridPrimitive(slotId);
                        break;
                    case 'queue':
                        primitive = createQueuePrimitive(slotId);
                        break;
                    case 'hashset':
                    case 'hashset-simple':
                        primitive = createHashSetPrimitive(slotId);
                        break;
                    case 'trie':
                        primitive = createTriePrimitive(slotId);
                        break;
                    case 'sll':
                        primitive = createSLLPrimitive(slotId);
                        break;
                    case 'dll':
                        primitive = createDLLPrimitive(slotId);
                        break;
                    case 'deque':
                        primitive = createDequePrimitive(slotId);
                        break;
                    case 'union-find':
                        primitive = createUnionFindPrimitive(slotId);
                        break;
                    case 'binary-tree':
                        primitive = createBinaryTreePrimitive(slotId);
                        break;
                    case 'heap':
                        primitive = createHeapPrimitive(slotId);
                        break;
                    case 'graph':
                        primitive = createGraphPrimitive(slotId);
                        break;
                    default:
                        primitive = createArrayPrimitive(slotId);
                }

                activeSlots[slotId] = primitive;
            });

            // Cleanup existing pointer container if it exists
            const existingPtr = document.getElementById('ptr-container');
            if (existingPtr) {
                existingPtr.remove();
            }

            // Add pointer container after all slots
            const ptrPanel = document.createElement('div');
            ptrPanel.id = 'ptr-container';
            ptrPanel.className = 'ptr-container-global';
            // Insert after the slots container
            if (slotsContainer.nextSibling) {
                slotsContainer.parentElement.insertBefore(ptrPanel, slotsContainer.nextSibling);
            } else {
                slotsContainer.parentElement.appendChild(ptrPanel);
            }
        }

        const createHashSetPrimitive = (slotId) => ({
            slotId,
            data: new Set(),
            add(val) {
                this.data.add(val);
                this.render();
            },
            has(val) {
                return this.data.has(val);
            },
            delete(val) {
                // Alias for remove
                this.remove(val);
            },
            remove(val) {
                this.data.delete(val);
                this.render();
            },
            clear() {
                this.data.clear();
                this.render();
            },
            size() {
                return this.data.size;
            },
            init(vals) {
                this.data = new Set(vals);
                this.render();
            },
            highlight(val, color) {
                const container = document.getElementById(`slot-${this.slotId}-content`);
                container.querySelectorAll('.hashset-tag').forEach(tag => {
                    if (tag.innerText === String(val)) {
                        tag.style.background = color;
                        tag.style.transform = 'scale(1.1)';
                        tag.style.boxShadow = `0 0 15px ${color}`;
                    }

        const createUnionFindPrimitive = (slotId) => ({

            init(size) {

                        val: i,
                        parent: i,
                        rank: 0,
                        x: 0,

                    });

            },

            find(i) {
                if (i < 0 || i >= this.data.length) return -1;
                // Path Compression
                const path = [];
                let curr = i;
                while (this.data[curr].parent !== curr) {
                    path.push(curr);
                    curr = this.data[curr].parent;
                }

                // Compress & highlight logic can be separate or integrated?
                // For simplicity, just compress
                for (const nodeIdx of path) {
                    this.data[nodeIdx].parent = curr;

                // Highlight done in render or explicitly called?

                this.highlightNode(curr, '#10b981'); // Root Green
                path.forEach(idx => this.highlightNode(idx, '#3b82f6')); // Path Blue

                this.render();

                // Actually if we want step-by-step, we might want to separate find and union calls in the script.

                if (rootI !== -1 && rootJ !== -1 && rootI !== rootJ) {
                    const nodeI = this.data[rootI];
                    const nodeJ = this.data[rootJ];

                    if (nodeI.rank < nodeJ.rank) {
                        nodeI.parent = rootJ;
                    } else if (nodeI.rank > nodeJ.rank) {
                        nodeJ.parent = rootI;
                    } else {
                        nodeJ.parent = rootI;
