<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playground Test Runner</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        /* === USING YOUR EXACT THEME === */
        :root {
            --bg-body: #0f172a;
            --bg-panel: #1e293b;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --border: #334155;
            /* Node Colors */
            --node-bg: #1e293b;
            --node-border: #64748b;
            /* Simple Structs - YOUR COLORS */
            --array-bg: #064e3b;
            --array-border: #34d399;
            --stack-bg: #0c4a6e;
            --stack-border: #38bdf8;
            --queue-bg: #831843;
            --queue-border: #f472b6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px 24px;
            padding-bottom: 110px;
            /* Space for fixed controls */
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Main two-column layout */
        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            align-items: start;
            transition: grid-template-columns 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .main-layout.sidebar-collapsed {
            grid-template-columns: 0px 1fr;
            gap: 0px;
        }

        @media (max-width: 1000px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        /* Left column - stacks problem + input */
        .left-column {
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: sticky;
            top: 20px;
            overflow: hidden;
            transition: opacity 0.3s ease, transform 0.3s ease;
            min-width: 0;
        }

        .sidebar-collapsed .left-column {
            opacity: 0;
            transform: translateX(-20px);
            pointer-events: none;
        }

        /* Sidebar toggle button */
        .sidebar-toggle {
            position: fixed;
            top: 80px;
            left: 20px;
            z-index: 1001;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            color: var(--text-sub);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.25s ease;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        .sidebar-toggle:hover {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border-color: #3b82f6;
            transform: scale(1.08);
        }

        .sidebar-toggle .arrow {
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .sidebar-collapsed .sidebar-toggle .arrow {
            transform: rotate(180deg);
        }

        /* Problem description panel */
        .problem-panel {
            background: var(--bg-panel);
            border-radius: 14px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .problem-panel h2 {
            font-size: 1.15rem;
            margin-bottom: 14px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .problem-panel h2 .icon {
            font-size: 1.3rem;
        }

        .problem-description {
            color: var(--text-sub);
            line-height: 1.6;
            font-size: 0.88rem;
        }

        .problem-description p {
            margin-bottom: 10px;
        }

        .problem-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }

        .tag {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .tag.easy {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
        }

        .tag.medium {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
        }

        .tag.hard {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        .right-content {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        h1 {
            text-align: center;
            margin-bottom: 16px;
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f8fafc, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .panel {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.95) 0%, rgba(15, 23, 42, 0.9) 100%);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 0;
            border: 1px solid rgba(100, 116, 139, 0.3);
            box-shadow:
                0 4px 20px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset,
                0 1px 0 rgba(255, 255, 255, 0.1) inset;
            backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        }

        .panel h3 {
            margin-bottom: 16px;
            color: #e2e8f0;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel h3::before {
            content: '';
            width: 4px;
            height: 14px;
            background: linear-gradient(180deg, #3b82f6, #8b5cf6);
            border-radius: 2px;
        }

        #input-field {
            width: 100%;
            padding: 14px;
            background: var(--bg-body);
            border: 1px solid var(--border);
            color: white;
            border-radius: 8px;
            font-family: "Fira Code", monospace;
            font-size: 1rem;
            margin-bottom: 10px;
            transition: border-color 0.2s;
        }

        #input-field:focus {
            outline: none;
            border-color: var(--text-sub);
            box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.2);
        }

        .input-group {
            margin-bottom: 10px;
        }

        .input-label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-field {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-body);
            border: 1px solid var(--border);
            color: white;
            border-radius: 8px;
            font-family: "Fira Code", monospace;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--text-sub);
            box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.2);
        }

        .input-field::placeholder {
            color: #64748b;
            font-style: italic;
        }

        /* === SLOT CONTENT STYLES === */
        .slot-content {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            min-height: 240px;
            justify-content: center;
            align-items: center;
            padding: 24px 20px;
        }

        .ptr-container-global {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 16px;
        }

        .array-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s ease;
        }

        .array-cell:hover {
            transform: translateY(-3px);
        }

        .array-box {
            width: 76px;
            height: 76px;
            background: linear-gradient(145deg, rgba(6, 78, 59, 0.9), rgba(6, 78, 59, 0.7));
            border: 2px solid var(--array-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.5rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 14px;
            box-shadow:
                0 4px 12px rgba(52, 211, 153, 0.2),
                0 0 0 1px rgba(52, 211, 153, 0.1) inset,
                0 2px 0 rgba(255, 255, 255, 0.1) inset;
            position: relative;
            overflow: hidden;
        }

        .array-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent);
            border-radius: 10px 10px 0 0;
        }

        .array-box:hover {
            transform: scale(1.05);
            box-shadow:
                0 8px 24px rgba(52, 211, 153, 0.3),
                0 0 0 1px rgba(52, 211, 153, 0.2) inset,
                0 2px 0 rgba(255, 255, 255, 0.15) inset;
            border-color: #6ee7b7;
        }

        .array-idx {
            font-family: "Fira Code", monospace;
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 12px;
            background: rgba(100, 116, 139, 0.15);
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: 500;
        }

        /* === PREMIUM STACK STYLES === */
        .stack-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            min-height: 300px;
            padding: 20px;
        }

        .stack-container {
            position: relative;
            border-left: 3px solid #64748b;
            border-right: 3px solid #64748b;
            border-bottom: 3px solid #64748b;
            width: 180px;
            min-height: 280px;
            padding: 18px;
            display: flex;
            flex-direction: column-reverse;
            gap: 12px;
            border-radius: 0 0 18px 18px;
            background: linear-gradient(180deg, transparent 0%, rgba(12, 74, 110, 0.1) 100%);
            box-shadow:
                0 8px 24px rgba(0, 0, 0, 0.3),
                inset 0 -20px 40px rgba(12, 74, 110, 0.1);
        }

        .stack-container::before {
            content: 'STACK';
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: #64748b;
            letter-spacing: 3px;
            font-weight: 600;
        }

        .stack-item {
            height: 56px;
            background: linear-gradient(145deg, rgba(12, 74, 110, 0.95), rgba(12, 74, 110, 0.75));
            border: 2px solid var(--stack-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.35rem;
            animation: stackDropIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            transition: all 0.25s ease;
            border-radius: 12px;
            box-shadow:
                0 3px 10px rgba(56, 189, 248, 0.2),
                0 0 0 1px rgba(56, 189, 248, 0.1) inset,
                0 1px 0 rgba(255, 255, 255, 0.1) inset;
            position: relative;
            overflow: hidden;
        }

        .stack-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent);
            border-radius: 8px 8px 0 0;
        }

        .stack-item:hover {
            transform: scale(1.03);
            box-shadow:
                0 6px 20px rgba(56, 189, 248, 0.35),
                0 0 0 1px rgba(56, 189, 248, 0.2) inset;
        }

        @keyframes stackDropIn {
            0% {
                opacity: 0;
                transform: translateY(-30px) scale(0.9);
            }

            70% {
                transform: translateY(5px) scale(1.02);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes dropIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* === POINTER INDICATORS === */
        #ptr-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            min-height: 40px;
            margin-top: 8px;
        }

        .ptr-indicator {
            font-family: "Fira Code", monospace;
            font-size: 0.85rem;
            color: #fbbf24;
            padding: 6px 16px;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(245, 158, 11, 0.1));
            border: 1px solid rgba(245, 158, 11, 0.5);
            border-radius: 20px;
            box-shadow:
                0 2px 8px rgba(245, 158, 11, 0.15),
                0 0 0 1px rgba(245, 158, 11, 0.05) inset;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        .ptr-indicator:hover {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.3), rgba(245, 158, 11, 0.15));
            transform: translateY(-2px);
            box-shadow:
                0 4px 12px rgba(245, 158, 11, 0.25),
                0 0 0 1px rgba(245, 158, 11, 0.1) inset;
        }

        /* === LOG PANEL === */
        #log-container {
            font-family: "Fira Code", monospace;
            font-size: 0.95rem;
            color: #fbbf24;
            min-height: 40px;
            padding: 14px 18px;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.2));
            border-radius: 12px;
            border: 1px solid rgba(251, 191, 36, 0.2);
            box-shadow:
                0 4px 16px rgba(0, 0, 0, 0.2),
                0 0 0 1px rgba(255, 255, 255, 0.03) inset;
            line-height: 1.5;
        }

        /* === YOUR EXACT STEP CONTROLS === */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(12px);
            padding: 10px 24px;
            border-radius: 50px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            /* Fixed at bottom */
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }

        .step-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
            font-size: 1.1rem;
        }

        .step-btn:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }

        .step-btn:disabled {
            background: rgba(100, 116, 139, 0.3);
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.5;
        }

        /* Auto-play specific styles */
        .separator {
            width: 1px;
            height: 30px;
            background: var(--border);
            margin: 0 5px;
        }

        .autoplay-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .speed-control {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .speed-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 80px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            outline: none;
        }

        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #f59e0b;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .speed-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .speed-label {
            font-family: "Fira Code", monospace;
            font-size: 0.7rem;
            color: var(--text-sub);
        }

        #btn-reset {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-sub);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: all 0.2s;
            margin-top: 4px;
        }

        #btn-reset:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border-color: var(--text-sub);
        }

        #step-indicator {
            font-family: "Fira Code", monospace;
            font-size: 0.9rem;
            color: var(--text-sub);
            min-width: 100px;
            text-align: center;
        }

        .layout-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            flex: 1;
        }

        @media (max-width: 768px) {
            .layout-row {
                grid-template-columns: 1fr;
            }
        }

        /* === PREMIUM HASHMAP STYLES === */
        .hashmap-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 220px;
            padding: 20px;
        }

        .hashmap-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 360px;
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.5), rgba(15, 23, 42, 0.3));
            padding: 24px;
            border-radius: 18px;
            border: 1px solid rgba(100, 116, 139, 0.2);
        }

        .hashmap-header {
            display: grid;
            grid-template-columns: 130px 190px;
            gap: 6px;
            padding-bottom: 14px;
            border-bottom: 2px solid rgba(100, 116, 139, 0.3);
            margin-bottom: 10px;
        }

        .hashmap-header-cell {
            font-family: "Fira Code", monospace;
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 10px 14px;
            font-weight: 600;
        }

        .hashmap-row {
            display: grid;
            grid-template-columns: 130px 190px;
            gap: 6px;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .hashmap-row:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow:
                0 8px 24px rgba(59, 130, 246, 0.25),
                0 4px 12px rgba(0, 0, 0, 0.3);
        }

        .hashmap-key {
            background: linear-gradient(145deg, #3b82f6, #2563eb);
            color: white;
            padding: 14px 16px;
            font-weight: 700;
            font-family: "Fira Code", monospace;
            font-size: 1.1rem;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hashmap-key::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.15), transparent);
        }

        .hashmap-value {
            background: linear-gradient(145deg, #10b981, #059669);
            color: white;
            padding: 14px 16px;
            font-family: "Fira Code", monospace;
            font-size: 1.1rem;
            font-weight: 600;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hashmap-value::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent);
        }

        .hashmap-empty {
            color: #64748b;
            font-style: italic;
            text-align: center;
            padding: 30px 20px;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>
    <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle sidebar">
        <span class="arrow">◀</span>
    </button>

    <div class="container">
        <h1>🎮 Playground Test</h1>

        <div class="main-layout" id="main-layout">
            <!-- Left: Problem Description + Input -->
            <div class="left-column">
                <div class="problem-panel">
                    <h2><span class="icon">📖</span> <span id="problem-title">Problem</span></h2>
                    <div class="problem-description" id="problem-description">
                        <p>Loading problem description...</p>
                    </div>
                    <div class="problem-tags" id="problem-tags"></div>
                </div>

                <div class="panel" id="input-panel">
                    <h3>Input</h3>
                    <div id="inputs-container">
                        <!-- Dynamic inputs will be added here -->
                    </div>
                    <button id="btn-reset" onclick="reset()">▶ Start / Reset</button>
                </div>
            </div>

            <!-- Right: Data Structures + Pointer + Log -->
            <div class="right-content">
                <!-- Data structure slots -->
                <div class="layout-row" id="slots-container">
                    <!-- Dynamic slots will be created here based on JSON config -->
                </div>

                <!-- Pointer indicators -->
                <div id="ptr-container" class="ptr-container-global"></div>

                <div class="panel log-panel">
                    <h3>Log</h3>
                    <div id="log-container">Click "Start" to begin...</div>
                </div>
            </div> <!-- end right-content -->
        </div> <!-- end main-layout -->

        <div class="controls">
            <button class="step-btn" id="btn-prev" disabled>←</button>
            <span id="step-indicator">Step 0</span>
            <button class="step-btn" id="btn-next" disabled>→</button>

            <div class="separator"></div>

            <div class="autoplay-controls">
                <button class="step-btn" id="btn-play"
                    style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">▶</button>
                <div class="speed-control">
                    <input type="range" id="speed-slider" class="speed-slider" min="100" max="2000" value="800"
                        step="100">
                    <span class="speed-label">Speed</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ SIDEBAR TOGGLE ============
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const mainLayout = document.getElementById('main-layout');

        // Check saved state
        const sidebarState = localStorage.getItem('playground-sidebar');
        if (sidebarState === 'collapsed') {
            mainLayout.classList.add('sidebar-collapsed');
        }

        sidebarToggle.addEventListener('click', () => {
            mainLayout.classList.toggle('sidebar-collapsed');
            const isCollapsed = mainLayout.classList.contains('sidebar-collapsed');
            localStorage.setItem('playground-sidebar', isCollapsed ? 'collapsed' : 'expanded');
        });

        // ============ SLOT-BASED DYNAMIC PRIMITIVES ============

        // Active slots registry - stores all slot instances
        let activeSlots = {};

        // Factory functions to create primitives for a specific slot
        const createArrayPrimitive = (slotId) => ({
            slotId,
            data: [],
            init(vals) {
                this.data = [...vals];
                this.render();
            },
            get(i) { return this.data[i]; },
            set(i, v) { this.data[i] = v; this.render(); },
            swap(i, j) {
                [this.data[i], this.data[j]] = [this.data[j], this.data[i]];
                this.render();
            },
            highlight(i, color) {
                const container = document.getElementById(`slot-${this.slotId}-content`);
                const boxes = container.querySelectorAll('.array-box');
                if (boxes[i]) {
                    boxes[i].style.backgroundColor = color;
                    boxes[i].style.borderColor = color;
                }
            },
            highlightRange(start, end, color) {
                for (let i = start; i <= end; i++) this.highlight(i, color);
            },
            clearHighlights() {
                const container = document.getElementById(`slot-${this.slotId}-content`);
                container.querySelectorAll('.array-box').forEach(b => {
                    b.style.backgroundColor = '';
                    b.style.borderColor = '';
                });
            },
            get length() { return this.data.length; },
            render() {
                const container = document.getElementById(`slot-${this.slotId}-content`);
                if (!container) return;
                container.innerHTML = this.data.map((v, i) =>
                    `<div class="array-cell">
                        <div class="array-box">${v}</div>
                        <div class="array-idx">${i}</div>
                    </div>`
                ).join('');
            },
            clone() {
                return { data: [...this.data] };
            },
            restore(state) {
                this.data = [...state.data];
                this.render();
            }
        });

        const createStackPrimitive = (slotId) => ({
            slotId,
            data: [],
            push(v) { this.data.push(v); this.render(); },
            pop() { const v = this.data.pop(); this.render(); return v; },
            peek() { return this.data[this.data.length - 1]; },
            isEmpty() { return this.data.length === 0; },
            size() { return this.data.length; },
            highlight(i, color) {
                const container = document.getElementById(`slot-${this.slotId}-content`);
                const items = container.querySelectorAll('.stack-item');
                if (items[i]) {
                    items[i].style.backgroundColor = color;
                    items[i].style.borderColor = color;
                }
            },
            clear() { this.data = []; this.render(); },
            render() {
                const container = document.getElementById(`slot-${this.slotId}-content`);
                if (!container) return;
                container.innerHTML = `<div class="stack-wrapper"><div class="stack-container">` +
                    this.data.map(v => `<div class="stack-item">${v}</div>`).join('') +
                    `</div></div>`;
            },
            clone() {
                return { data: [...this.data] };
            },
            restore(state) {
                this.data = [...state.data];
                this.render();
            }
        });

        const createHashmapPrimitive = (slotId) => ({
            slotId,
            data: new Map(),
            put(key, val) {
                this.data.set(key, val);
                this.render();
            },
            get(key) {
                return this.data.get(key);
            },
            has(key) {
                return this.data.has(key);
            },
            remove(key) {
                this.data.delete(key);
                this.render();
            },
            clear() {
                this.data.clear();
                this.render();
            },
            size() {
                return this.data.size;
            },
            highlight(key, color) {
                const container = document.getElementById(`slot-${this.slotId}-content`);
                container.querySelectorAll('.hashmap-row').forEach(row => {
                    if (row.dataset.key === String(key)) {
                        row.querySelector('.hashmap-key').style.background = color;
                        row.querySelector('.hashmap-value').style.background = color;
                    }
                });
            },
            clearHighlights() {
                const container = document.getElementById(`slot-${this.slotId}-content`);
                container.querySelectorAll('.hashmap-key').forEach(el => el.style.background = '');
                container.querySelectorAll('.hashmap-value').forEach(el => el.style.background = '');
            },
            render() {
                const container = document.getElementById(`slot-${this.slotId}-content`);
                if (!container) return;

                if (this.data.size === 0) {
                    container.innerHTML = '<div class="hashmap-wrapper"><div class="hashmap-container"><div class="hashmap-empty">Empty</div></div></div>';
                    return;
                }

                const entries = [...this.data.entries()].sort((a, b) => {
                    if (typeof a[0] === 'number' && typeof b[0] === 'number') return a[0] - b[0];
                    return String(a[0]).localeCompare(String(b[0]));
                });

                let html = `<div class="hashmap-wrapper"><div class="hashmap-container">
                    <div class="hashmap-header">
                        <div class="hashmap-header-cell">Key</div>
                        <div class="hashmap-header-cell">Value</div>
                    </div>`;

                entries.forEach(([key, val]) => {
                    html += `<div class="hashmap-row" data-key="${key}">
                        <div class="hashmap-key">${key}</div>
                        <div class="hashmap-value">${val}</div>
                    </div>`;
                });

                container.innerHTML = html + `</div></div>`;
            },
            clone() {
                // Convert Map to array of entries for reliable cloning
                return { entries: [...this.data.entries()] };
            },
            restore(state) {
                // Restore from array of entries
                this.data = new Map(state.entries);
                this.render();
            }
        });

        // Pointer primitive (shared across all slots)
        const ptrPrimitive = {
            pointers: {},
            set(name, idx) {
                this.pointers[name] = idx;
                this.render();
            },
            get(name) { return this.pointers[name]; },
            remove(name) {
                delete this.pointers[name];
                this.render();
            },
            clear() {
                this.pointers = {};
                this.render();
            },
            render() {
                const container = document.getElementById('ptr-container');
                if (!container) return;
                container.innerHTML = Object.entries(this.pointers)
                    .map(([name, idx]) => `<div class="ptr-indicator">${name}=${idx}</div>`)
                    .join('');
            },
            clone() {
                return { pointers: { ...this.pointers } };
            },
            restore(state) {
                this.pointers = { ...state.pointers };
                this.render();
            }
        };

        // Build slots from JSON config
        function buildSlots(slots) {
            const slotsContainer = document.getElementById('slots-container');
            // Keep the input panel where it is (in left column)
            const inputPanel = document.getElementById('input-panel');
            const leftColumn = document.querySelector('.left-column');

            // Safety check: if input panel was previously moved to slots container (by buggy code), move it back
            if (inputPanel && inputPanel.parentElement !== leftColumn) {
                leftColumn.appendChild(inputPanel);
            }

            slotsContainer.innerHTML = '';
            activeSlots = {};

            if (!slots || slots.length === 0) {
                slotsContainer.style.gridTemplateColumns = '1fr';
                return;
            }

            // Set grid columns: input panel + data slots
            const totalCols = Math.min(slots.length + 1, 3);
            slotsContainer.style.gridTemplateColumns = `repeat(${totalCols}, 1fr)`;

            slots.forEach((slot, idx) => {
                const slotId = slot.id || `slot${idx}`;
                const slotType = slot.type || 'array';
                const slotLabel = slot.label || slotType.charAt(0).toUpperCase() + slotType.slice(1);

                // Create panel HTML
                const panel = document.createElement('div');
                panel.className = 'panel';
                panel.id = `slot-${slotId}-panel`;
                panel.innerHTML = `
                    <h3>${slotLabel}</h3>
                    <div id="slot-${slotId}-content" class="slot-content"></div>
                `;
                slotsContainer.appendChild(panel);

                // Create primitive instance based on type
                let primitive;
                switch (slotType) {
                    case 'array':
                        primitive = createArrayPrimitive(slotId);
                        break;
                    case 'stack':
                        primitive = createStackPrimitive(slotId);
                        break;
                    case 'hashmap':
                    case 'hashmap-simple':
                        primitive = createHashmapPrimitive(slotId);
                        break;
                    default:
                        primitive = createArrayPrimitive(slotId);
                }

                activeSlots[slotId] = primitive;
            });

            // Cleanup existing pointer container if it exists
            const existingPtr = document.getElementById('ptr-container');
            if (existingPtr) {
                existingPtr.remove();
            }

            // Add pointer container after all slots
            const ptrPanel = document.createElement('div');
            ptrPanel.id = 'ptr-container';
            ptrPanel.className = 'ptr-container-global';
            // Insert after the slots container
            if (slotsContainer.nextSibling) {
                slotsContainer.parentElement.insertBefore(ptrPanel, slotsContainer.nextSibling);
            } else {
                slotsContainer.parentElement.appendChild(ptrPanel);
            }
        }

        function log(msg) {
            document.getElementById('log-container').textContent = msg;
        }

        // ============ STEP CONTROLLER ============

        let resolveStep = null;
        let stepSnapshots = [];  // Indexed array: stepSnapshots[stepIndex] = complete state
        let currentStepIndex = 0;
        let maxStepReached = 0;
        let isAutoPlaying = false;
        let autoPlayTimer = null;
        let autoPlayDelay = 800;
        let algorithmComplete = false;

        function updateStepIndicator() {
            document.getElementById('step-indicator').textContent = `Step ${currentStepIndex}`;
        }

        // Capture highlights from a specific slot container
        function captureSlotHighlights(slotId) {
            const container = document.getElementById(`slot-${slotId}-content`);
            if (!container) return [];

            const highlights = [];

            container.querySelectorAll('.array-box').forEach((box, i) => {
                highlights.push({
                    type: 'array-box',
                    index: i,
                    bg: box.style.backgroundColor || '',
                    border: box.style.borderColor || ''
                });
            });

            container.querySelectorAll('.stack-item').forEach((item, i) => {
                highlights.push({
                    type: 'stack-item',
                    index: i,
                    bg: item.style.backgroundColor || '',
                    border: item.style.borderColor || ''
                });
            });

            container.querySelectorAll('.hashmap-row').forEach((row) => {
                const keyEl = row.querySelector('.hashmap-key');
                const valEl = row.querySelector('.hashmap-value');
                highlights.push({
                    type: 'hashmap-row',
                    key: row.dataset.key,
                    keyBg: keyEl ? keyEl.style.background : '',
                    valBg: valEl ? valEl.style.background : ''
                });
            });

            return highlights;
        }

        // Restore highlights to a specific slot container
        function restoreSlotHighlights(slotId, highlights) {
            const container = document.getElementById(`slot-${slotId}-content`);
            if (!container || !highlights) return;

            highlights.forEach(h => {
                if (h.type === 'array-box') {
                    const boxes = container.querySelectorAll('.array-box');
                    if (boxes[h.index]) {
                        boxes[h.index].style.backgroundColor = h.bg;
                        boxes[h.index].style.borderColor = h.border;
                    }
                } else if (h.type === 'stack-item') {
                    const items = container.querySelectorAll('.stack-item');
                    if (items[h.index]) {
                        items[h.index].style.backgroundColor = h.bg;
                        items[h.index].style.borderColor = h.border;
                    }
                } else if (h.type === 'hashmap-row') {
                    container.querySelectorAll('.hashmap-row').forEach(row => {
                        if (row.dataset.key === h.key) {
                            const keyEl = row.querySelector('.hashmap-key');
                            const valEl = row.querySelector('.hashmap-value');
                            if (keyEl) keyEl.style.background = h.keyBg;
                            if (valEl) valEl.style.background = h.valBg;
                        }
                    });
                }
            });
        }

        // Capture complete snapshot of ALL state
        function captureSnapshot() {
            const snapshot = {
                slots: {},
                highlights: {},
                pointers: { ...ptrPrimitive.pointers },
                log: document.getElementById('log-container').textContent
            };

            for (const [id, slot] of Object.entries(activeSlots)) {
                const cloned = slot.clone();
                console.log(`[CAPTURE] Slot "${id}":`, cloned);
                snapshot.slots[id] = cloned;
                snapshot.highlights[id] = captureSlotHighlights(id);
            }

            console.log(`[CAPTURE] Full snapshot at step ${currentStepIndex}:`, JSON.stringify(snapshot.slots));
            return snapshot;
        }

        // Restore complete state from snapshot
        function restoreSnapshot(snapshot) {
            if (!snapshot) {
                console.error('[RESTORE] Snapshot is null/undefined!');
                return;
            }

            console.log(`[RESTORE] Restoring to step ${currentStepIndex}:`, JSON.stringify(snapshot.slots));

            // Restore slot data (which re-renders)
            for (const [id, state] of Object.entries(snapshot.slots)) {
                if (activeSlots[id]) {
                    console.log(`[RESTORE] Restoring slot "${id}" with:`, state);
                    activeSlots[id].restore(state);
                } else {
                    console.error(`[RESTORE] Slot "${id}" not found in activeSlots!`);
                }
            }

            // Restore highlights after render completed
            for (const [id, highlights] of Object.entries(snapshot.highlights)) {
                restoreSlotHighlights(id, highlights);
            }

            // Restore pointers
            ptrPrimitive.pointers = { ...snapshot.pointers };
            ptrPrimitive.render();

            // Restore log
            document.getElementById('log-container').textContent = snapshot.log;
        }

        function toggleAutoPlay() {
            isAutoPlaying = !isAutoPlaying;
            const btn = document.getElementById('btn-play');

            if (isAutoPlaying) {
                btn.textContent = '⏸';
                if (resolveStep) {
                    triggerNextStep();
                }
            } else {
                btn.textContent = '▶';
                if (autoPlayTimer) {
                    clearTimeout(autoPlayTimer);
                    autoPlayTimer = null;
                }
            }
        }

        function triggerNextStep() {
            if (autoPlayTimer) clearTimeout(autoPlayTimer);
            const delay = autoPlayDelay || 800;

            autoPlayTimer = setTimeout(() => {
                if (isAutoPlaying) {
                    // If we are reviewing history, simulate a next click
                    if (currentStepIndex < maxStepReached) {
                        document.getElementById('btn-next').click();
                        triggerNextStep(); // Schedule next
                    } else if (resolveStep) {
                        // We are at the frontier, let the algorithm proceed
                        document.getElementById('btn-next').disabled = true;
                        resolveStep();
                        resolveStep = null;
                        // updateButtons and next trigger will happen in awaitStep
                    } else {
                        // Finished
                        isAutoPlaying = false;
                        document.getElementById('btn-play').textContent = '▶';
                    }
                }
            }, delay);
        }

        function awaitStep(runId) {
            if (runId !== undefined && runId !== executionId) {
                // If this step comes from an old/cancelled run, return a promise that never resolves
                // This effectively kills the old async execution
                return new Promise(() => { });
            }
            return new Promise(resolve => {
                // Increment FIRST, then store at the new step index
                currentStepIndex++;
                maxStepReached = currentStepIndex;

                // Store snapshot AT the step that's now being displayed
                stepSnapshots[currentStepIndex] = captureSnapshot();
                updateStepIndicator();

                resolveStep = resolve;
                updateButtons();

                if (isAutoPlaying) {
                    triggerNextStep();
                }

                if (isAutoPlaying) {
                    triggerNextStep();
                }
            });
        }

        function updateButtons() {
            // Prev enabled if we are past step 0
            document.getElementById('btn-prev').disabled = currentStepIndex <= 0;

            // Next enabled if:
            // 1. We have history ahead (current < max)
            // 2. OR we are at frontier and algorithm is running (!complete)
            const canGoNext = (currentStepIndex < maxStepReached) || (!algorithmComplete);
            document.getElementById('btn-next').disabled = !canGoNext;
        }

        document.getElementById('btn-next').addEventListener('click', () => {
            // Case 1: Navigate forward in history
            if (currentStepIndex < maxStepReached) {
                currentStepIndex++;
                restoreSnapshot(stepSnapshots[currentStepIndex]);
                updateStepIndicator();
                updateButtons();
                return;
            }

            // Case 2: Resume algorithm execution
            if (!algorithmComplete && resolveStep) {
                document.getElementById('btn-next').disabled = true;
                resolveStep();
                resolveStep = null;
            }
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            // Pause if playing
            if (isAutoPlaying) toggleAutoPlay();

            if (currentStepIndex > 0) {
                currentStepIndex--;
                restoreSnapshot(stepSnapshots[currentStepIndex]);
                updateStepIndicator();
                updateButtons();
            }
        });

        // Auto-play controls
        document.getElementById('btn-play').addEventListener('click', toggleAutoPlay);

        document.getElementById('speed-slider').addEventListener('input', (e) => {
            // Invert value so higher slider = faster (lower delay)
            // Slider 100-2000.  Map to delay. 
            // We want nice feel. Let's just use raw value but invert definition if needed?
            // Actually, let's keep it simple: slider value IS delay. 
            // So left (low number) is FAST, right (high number) is SLOW.
            // Wait, usually right is faster.
            // Let's do: Delay = Max - Val + Min.
            // Max=2000, Min=100. Val=2000 => Delay=100 (Fast). Val=100 => Delay=2000 (Slow).
            const val = parseInt(e.target.value);
            autoPlayDelay = 2100 - val;
        });

        // ============ PLAYGROUND EXECUTOR ============

        let playgroundSlots = []; // Store slot config from JSON

        let executionId = 0;

        async function runPlayground(code, input) {
            // Increment execution ID to invalidate any previous runs
            executionId++;
            const currentRunId = executionId;

            // Reset step tracking
            stepSnapshots = [];
            currentStepIndex = 0;
            maxStepReached = 0;
            algorithmComplete = false;
            updateStepIndicator();
            updateButtons();

            // Stop any existing autoplay
            isAutoPlaying = false;
            document.getElementById('btn-play').textContent = '▶';
            if (autoPlayTimer) clearTimeout(autoPlayTimer);

            // Build slots from JSON config
            buildSlots(playgroundSlots);

            // Clear pointers
            ptrPrimitive.clear();

            // Create Playground class from code string
            const PlaygroundClass = new Function('return ' + code)();
            const playground = new PlaygroundClass();

            // Inject slot primitives dynamically
            for (const [id, slot] of Object.entries(activeSlots)) {
                playground[id] = slot;
            }

            // Always inject ptr and log
            playground.ptr = ptrPrimitive;
            playground.log = log;
            playground.await = () => awaitStep(currentRunId);

            // Capture Step 0 (Initial State)
            stepSnapshots[0] = captureSnapshot();

            // Run!
            log('Starting...');
            try {
                const result = await playground.run(input);

                // Save final state snapshot (increment first to match awaitStep pattern)
                currentStepIndex++;
                maxStepReached = currentStepIndex;
                stepSnapshots[currentStepIndex] = captureSnapshot();
                updateStepIndicator();

                // Mark algorithm as complete for navigation
                algorithmComplete = true;
                updateButtons();

                log(`✅ Finished! Result: ${JSON.stringify(result)}`);
            } catch (e) {
                log(`❌ Error: ${e.message}`);
                console.error(e);
                algorithmComplete = true;  // Still allow navigation even on error
            }
        }

        // ============ LOAD PLACEHOLDER ============

        let playgroundCode = null;

        let playgroundInputs = [];

        fetch('placeholder.json')
            .then(r => r.json())
            .then(data => {
                playgroundCode = data.code;
                playgroundSlots = data.slots || [];
                playgroundInputs = data.inputs || [];

                // Build input fields from JSON config
                buildInputFields(playgroundInputs);

                // Populate problem description
                document.getElementById('problem-title').textContent = data.name || 'Problem';

                if (data.description) {
                    document.getElementById('problem-description').innerHTML = data.description;
                } else {
                    document.getElementById('problem-description').innerHTML = '<p>No description provided.</p>';
                }

                // Build tags
                const tagsContainer = document.getElementById('problem-tags');
                tagsContainer.innerHTML = '';

                if (data.difficulty) {
                    const diffTag = document.createElement('span');
                    diffTag.className = `tag ${data.difficulty.toLowerCase()}`;
                    diffTag.textContent = data.difficulty;
                    tagsContainer.appendChild(diffTag);
                }

                if (data.tags) {
                    data.tags.forEach(tag => {
                        const tagEl = document.createElement('span');
                        tagEl.className = 'tag';
                        tagEl.textContent = tag;
                        tagsContainer.appendChild(tagEl);
                    });
                }

                log('✓ Loaded! Click "Start" to begin.');
            })
            .catch(e => {
                log('❌ Failed to load placeholder.json');
                console.error(e);
            });

        function buildInputFields(inputs) {
            const container = document.getElementById('inputs-container');
            container.innerHTML = '';

            if (inputs.length === 0) {
                // Fallback: single generic input
                container.innerHTML = `
                    <div class="input-group">
                        <label class="input-label">Input</label>
                        <input type="text" class="input-field" id="input-0" placeholder="Enter values...">
                    </div>
                `;
                return;
            }

            inputs.forEach((inp, idx) => {
                const group = document.createElement('div');
                group.className = 'input-group';

                const label = document.createElement('label');
                label.className = 'input-label';
                label.textContent = inp.label || `Input ${idx + 1}`;
                label.setAttribute('for', `input-${idx}`);

                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'input-field';
                input.id = `input-${idx}`;
                input.placeholder = inp.placeholder || '';
                if (inp.default !== undefined) {
                    input.value = inp.default;
                }

                group.appendChild(label);
                group.appendChild(input);
                container.appendChild(group);
            });
        }

        function reset() {
            if (!playgroundCode) {
                log('Still loading...');
                return;
            }

            // Collect all input values
            const inputValues = [];
            const inputFields = document.querySelectorAll('#inputs-container .input-field');
            inputFields.forEach(field => {
                inputValues.push(field.value);
            });

            runPlayground(playgroundCode, inputValues);
        }
    </script>
</body>
