<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visually Code - Step-by-Step Visualizer</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="style.css">

    <!-- Old JS fallback parsing tools -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/acorn/8.11.3/acorn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/astring/1.8.6/astring.min.js"></script>

    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
</head>

<body>
    <div class="main-layout" style="display: flex; width: 100%; height: 100%; overflow: hidden;">
        <!-- Sidebar Controls / Editor Panel -->
        <div id="sidebar" class="cv-sidebar">
            <button class="back-btn" onclick="window.location.href='../index.html'">← Back Home</button>
            <h3 style="margin-top:0; border-bottom: 1px solid var(--border); padding-bottom: 10px; color: #fbbf24;">✨
                Code Visualizer</h3>

            <div class="editor-header">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span class="editor-title">Code Sandbox</span>
                    <select id="lang-select" class="lang-dropdown">
                        <option value="python">Python</option>
                        <option value="javascript">JavaScript (AST parsing)</option>
                        <option value="java" disabled>Java (Trace Coming Soon)</option>
                        <option value="cpp" disabled>C++ (Trace Coming Soon)</option>
                    </select>
                </div>
                <div class="editor-actions">
                    <button id="btnRunCode" class="control-btn run-btn">Run</button>
                    <button id="btnResetCode" class="control-btn cancel-btn">Reset</button>
                </div>
            </div>

            <div class="editor-container">
                <!-- Highlight layer behind the textarea (only used for JS AST fallback now) -->
                <div id="editor-highlight" class="editor-backdrop hidden"></div>
                <!-- Monaco Editor Mount -->
                <div id="monaco-editor" style="width: 100%; height: 100%;"></div>
            </div>

            <!-- Execution Controls (visible when running) -->
            <div id="execution-controls" class="ops-section hidden">
                <h4 class="ops-title" style="color:#fbbf24">Execution Controls</h4>
                <div class="step-controls-wrapper">
                    <button id="btnPrevStep" class="step-btn control-btn" disabled>Prev</button>
                    <button id="btnPlayPause" class="step-btn control-btn play-btn">Play</button>
                    <button id="btnNextStep" class="step-btn control-btn">Next</button>
                </div>
                <div class="speed-control-cv">
                    <label for="execution-speed">Speed:</label>
                    <input type="range" id="execution-speed" min="100" max="2000" value="800" step="100">
                </div>
            </div>
        </div>

        <!-- Draggable Resizer -->
        <div id="resizer" class="resizer"></div>

        <!-- Main Visual Area -->
        <div id="visual-area" class="cv-visual-area">
            <div class="visual-header">
                <h2>Execution State</h2>
            </div>
            <div class="state-container">
                <div class="state-panel" id="variables-panel">
                    <h3 class="panel-subtitle">Variables</h3>
                    <div id="variables-list" class="variables-list">
                        <div class="empty-state">No variables tracked yet. Run code to see state.</div>
                    </div>
                </div>
                <!-- Console Resizer -->
                <div id="console-resizer" class="console-resizer"></div>
                <div class="state-panel" id="console-panel">
                    <h3 class="panel-subtitle">Console Output</h3>
                    <div id="console-output" class="console-output"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
